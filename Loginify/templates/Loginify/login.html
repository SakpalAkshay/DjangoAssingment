{% extends "Loginify/base.html" %}
{% block title %}Log In | Loginify{% endblock %}
{% block content %}
<h1>Welcome back</h1>
<p class="sub">Log in to your Loginify account.</p>
<form method="post" action="{% url 'login' %}">
    {% csrf_token %}
    <label for="email">Email</label>
    <input type="email" id="email" name="email" placeholder="you@example.com" required>

    <label for="password">Password</label>
    <input type="password" id="password" name="password" maxlength="12" placeholder="••••••••">

    <button type="submit">Log In</button>
</form>
<div class="links">
    New here? <a href="{% url 'signup' %}">Create an account</a>
</div>
{% endblock %}
