<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Loginify{% endblock %}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f0f4f2;
            margin: 0;
        }
        .card {
            width: 350px;
            margin: 80px auto;
            padding: 30px;
            border: 1px solid #ccc;
            border-radius: 8px;
            background: #fff;
        }
        h1 { color: #2f8f6f; }
        label { display: block; margin-bottom: 5px; }
        input {
            width: 100%;
            padding: 8px;
            margin-bottom: 15px;
        }
        button {
            padding: 10px 15px;
            background: #2f8f6f;
            color: #fff;
            border: none;
            border-radius: 5px;
        }
        .messages { list-style: none; padding: 0; }
        .messages li {
            color: red;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="card">
        {% if messages %}
        <ul class="messages">
            {% for message in messages %}
            <li>{{ message }}</li>
            {% endfor %}
        </ul>
        {% endif %}
        {% block content %}{% endblock %}
    </div>
</body>
</html>
