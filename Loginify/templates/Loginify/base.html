<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Loginify{% endblock %}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
            background: #f0f4f2;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #1f2d29;
        }
        .card {
            background: #fff;
            width: 100%;
            max-width: 380px;
            padding: 40px 32px;
            border-radius: 14px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
        }
        h1 { font-size: 1.6rem; margin-bottom: 6px; color: #2f8f6f; }
        p.sub { color: #6b7d77; margin-bottom: 24px; font-size: 0.9rem; }
        label { display: block; font-size: 0.8rem; margin-bottom: 6px; font-weight: 600; }
        input {
            width: 100%;
            padding: 11px 13px;
            margin-bottom: 16px;
            border: 1px solid #d5ddd9;
            border-radius: 8px;
            font-size: 0.95rem;
        }
        input:focus { outline: none; border-color: #2f8f6f; }
        button {
            width: 100%;
            padding: 12px;
            background: #2f8f6f;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover { background: #277a5e; }
        .messages { list-style: none; margin-bottom: 16px; }
        .messages li {
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 8px;
            background: #fdecea;
            color: #b3261e;
        }
        .links { margin-top: 18px; text-align: center; font-size: 0.85rem; }
        .links a { color: #2f8f6f; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="card">
        {% if messages %}
        <ul class="messages">
            {% for message in messages %}
            <li>{{ message }}</li>
            {% endfor %}
        </ul>
        {% endif %}
        {% block content %}{% endblock %}
    </div>
</body>
</html>
